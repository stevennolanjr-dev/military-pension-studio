            <LearnBlock title="How to estimate your Social Security benefit without logging in">
              <p>The accurate number comes from your earnings record at <a href="https://www.ssa.gov/myaccount" target="_blank" rel="noopener" style={{color:"var(--accent)",textDecoration:"underline"}}>ssa.gov/myaccount</a>. You can create an account in about 5 minutes. The "Your Latest Statement" PDF shows your projected benefit at 62, full retirement age (67), and 70 — already adjusted for your actual earnings history. <strong>This is the only authoritative source. There is no API for third-party tools to auto-pull it.</strong></p>
              <p><strong>SSA Quick Calculator</strong> (<a href="https://www.ssa.gov/OACT/quickcalc/" target="_blank" rel="noopener" style={{color:"var(--accent)",textDecoration:"underline"}}>ssa.gov/OACT/quickcalc</a>) gives an estimate from your birth date + current annual salary, no login needed. Less accurate than your real record but close enough for planning.</p>
              <p><strong>Rough estimates for typical military careers</strong> (assuming you also worked civilian or earned military pay through the 35-year average):</p>
              <p>• <strong>E-7 to E-9 retiring at 20-30 years</strong>, then no significant civilian career: ~$2,000-2,600/mo at full retirement age<br/>• <strong>O-4 to O-5 retiring at 20-25 years</strong>, then no significant civilian career: ~$2,400-2,900/mo<br/>• <strong>O-6 retiring at 22-30 years</strong> with consistent above-average military pay: ~$2,700-3,200/mo<br/>• <strong>Add a 15-20 year federal civilian (GS) career on top</strong> at GS-13+: pushes you toward the maximum of ~$4,018/mo (2026 cap at full retirement age)<br/>• <strong>Add a high-earning private sector second career</strong>: similar effect, often hits the max</p>
              <p><strong>Why the calculation is opaque:</strong> SS uses your 35 highest-earning years (indexed for inflation), runs them through a progressive bend-point formula, then applies COLA adjustments. The first ~$1,200/mo of indexed earnings is replaced at 90%, the next ~$6,000 at 32%, the rest at 15%. This is why high earners stop seeing big SS gains past a certain point — the formula is regressive at the top.</p>
              <p><strong>For dual-military couples or military + GS:</strong> each spouse builds their own SS record. The lower earner can sometimes claim 50% of the higher earner's benefit if it exceeds their own (spousal benefit). Survivor benefits apply if either dies.</p>
              <p><strong>Common mistake:</strong> assuming military service doesn't count toward SS. It does — military basic pay has been subject to FICA since 1957. BAH and BAS do NOT count toward SS (they're not taxable).</p>
            </LearnBlock>

            <LearnBlock title="When to claim Social Security: early, on time, or delayed">
              <p>Social Security pays a base benefit at your Full Retirement Age (FRA) of 67 for those born 1960 or later. You can claim as early as 62 (with a permanent ~30% reduction) or delay to 70 (with a ~24% permanent increase). Every month matters: there is no "right answer," only tradeoffs.</p>
              <p><strong>Claim early (62-66) if:</strong> you need the income now (no other reliable cash flow); you have a shortened life expectancy from health diagnosis; you have dependents who'd receive auxiliary benefits; you'd otherwise tap retirement accounts that have higher tax cost.</p>
              <p><strong>Claim at FRA (67) if:</strong> you can comfortably bridge to 67 without it; you have average life expectancy; you want the simple choice with no surprises.</p>
              <p><strong>Delay to 70 if:</strong> you have other income (pension, civilian salary, TSP) to bridge; you (or your spouse) have above-average life expectancy; you're married and the higher earner — your survivor will inherit the larger benefit; you want longevity insurance.</p>
              <p><strong>The breakeven math:</strong> Claiming at 62 vs 67, you collect 5 extra years but at 70% of the rate. The crossover happens around age 80. If you live past 80, delaying wins. Past 85, delaying wins decisively. Below 78, claiming early wins.</p>
              <p><strong>Military-specific:</strong> Unlike federal civilian retirees (who can face the Windfall Elimination Provision and Government Pension Offset), military retirement pay does NOT reduce your Social Security. You get both in full. WEP/GPO were also fully repealed in 2025 by the Social Security Fairness Act, so this is no longer a concern for anyone.</p>
            </LearnBlock>
          </div>

          {system==="brs"&&(
            <details style={{marginTop:14}}>
              <summary>BRS lump sum option</summary>
              <div className="details-body">
                <div style={{fontSize:13,color:"var(--ink-2)",marginBottom:14}}>
                  Take 25% or 50% of the present value of your pension as a lump sum at retirement, in exchange for reduced monthly pay until age 67. The DoD personal discount rate (~7% in 2026) makes the lump sum mathematically inferior for most members. Lump sum payout shown is for current selection.
                </div>
                <div className="grid-2">
                  <div className="field">
                    <div className="field-label"><span>Lump sum election</span></div>
                    <div className="seg">
                      {[["none","None"],["25","25%"],["50","50%"]].map(([k,l])=>(
                        <button key={k} className={brsLump===k?"on":""} onClick={()=>setBrsLump(k)}>{l}</button>
                      ))}
                    </div>
                  </div>
                  <Stat label="Lump sum payout" value={fmt(calc.lumpSumPayout)} sub="paid at retirement"/>
                </div>
                <LearnBlock title="When the BRS lump sum makes sense">
                  <p>You're effectively borrowing your own future pension at the discount rate (~7% in 2026). To "win," you need to invest the lump at higher returns AND outlive the breakeven.</p>
                  <p><strong>Take the lump sum if:</strong> you have proven high-return uses (paying off 15%+ debt, business with clear cash flow); shortened life expectancy from serious diagnosis; you have specific known cash needs (down payment on retirement home).</p>
                  <p><strong>Skip it if:</strong> you'd invest in standard 60/40 portfolios (you won't beat 7%); you have normal life expectancy; you'd be tempted to spend it on consumption.</p>
                </LearnBlock>
              </div>
            </details>
          )}
        </section>

        {/* ===== TRANSITION ===== */}
        <section id="transition" className="section">
          <div className="section-h">
            <h2 className="section-title">Transition</h2>
            <div className="section-meta">First 12 months · cash runway</div>
          </div>
          <p className="section-lede">
            Active duty pay stops the day you retire. First pension check arrives weeks later. SkillBridge, terminal leave, TRICARE flip, and civilian start date all interact.
          </p>

          <div className="grid-2">
            <div className="surface">
              <div style={{fontSize:11,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14,fontWeight:500}}>Levers</div>
              <RangeField label="Terminal leave (days)" value={terminalDays} setter={setTerminalDays} min={0} max={60}/>
              <RangeField label="SkillBridge participation (months)" value={skillBridgeMo} setter={setSkillBridgeMo} min={0} max={6}/>
              <RangeField label="First pension check (day after retirement)" value={pensionLagDays} setter={setPensionLagDays} min={20} max={90}/>
              <div className="field">
                <div className="field-label">
                  <span>Civilian salary target (annual)</span>
                  <span className="field-value num">{fmt(civilianSalary)}</span>
                </div>
                <input type="range" className="range-track" min={0} max={500000} step={5000} value={civilianSalary} onChange={e=>setCivilianSalary(Number(e.target.value))}/>
                <div className="field-help">Used to compute total household income and federal tax bracket.</div>
              </div>

              {/* Civilian salary equivalency callout */}
              <div className="surface-inset" style={{marginTop:14,borderColor:calc.civilianGapStatus==="matches"?"var(--pos)":"var(--accent)"}}>
                <div style={{fontSize:11,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:6}}>To match active duty takehome <Conf level="medium"/></div>
                <div className="display" style={{fontSize:22}}>
                  Target: <span className="num text-accent">{fmt(calc.targetCivilianAnnual)}</span>/yr
                </div>
                <div style={{fontSize:12.5,color:"var(--ink-2)",marginTop:6,lineHeight:1.5}}>
                  Your active duty takehome is ~<b className="num" style={{color:"var(--ink)"}}>{fmt(calc.adMonthlyTakehome)}/mo</b> (base pay {fmt(calc.adBaseTakehome)} after federal tax, plus BAH {fmt(lostBAH)} and BAS {fmt(calc.basMonthly)}, both tax-free).
                  Your retirement net is <b className="num" style={{color:"var(--ink)"}}>{fmt(calc.homeCalc.netTotal)}/mo</b>, leaving a <b className="num" style={{color:"var(--ink)"}}>{fmt(calc.monthlyGapVsAD)}/mo</b> gap.
                  At your effective federal rate, you need <b className="num text-accent">{fmt(calc.targetCivilianAnnual)}/yr</b> civilian gross to break even.
                  {calc.civilianGapStatus==="matches"
                    ?<><br/><span className="text-pos">Your target salary of {fmt(civilianSalary)} clears the bar. You'll net more than active duty.</span></>
                    :<><br/><span className="text-accent">Your target of {fmt(civilianSalary)} is {fmt(calc.targetCivilianAnnual-civilianSalary)} short of active duty parity.</span></>}
                </div>
              </div>
            </div>
            <div className="surface">
              <div style={{fontSize:11,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14,fontWeight:500}}>Outcomes</div>
              <RunwayChart calc={calc} terminalDays={terminalDays} skillBridgeMo={skillBridgeMo} pensionLagDays={pensionLagDays} civilianSalary={civilianSalary}/>
              <div className="grid-2" style={{marginTop:18,gap:12}}>
                <Stat label="Terminal leave payout" value={fmt(calc.terminalLeavePay)} sub={`${terminalDays} days × ${fmt(calc.terminalLeavePay/Math.max(1,terminalDays))}/day`}/>
                <Stat label="Steady-state household" value={`${fmt(calc.householdRunway)}/mo`} sub="civilian + pension"/>
              </div>
            </div>
          </div>

          <LearnBlock title="The BAH cliff and the income gap most people miss">
            <p>Basic Allowance for Housing (BAH) stops the day you retire. For senior members in high-cost duty stations, this is a $3,000-5,000/month cliff. Civilian salaries are taxed; BAH was not. So a $100K civilian salary doesn't replace $7K base pay + $4K BAH.</p>
            <p>Quick math: take your monthly active duty compensation (base pay + BAH + BAS - Basic Allowance for Subsistence), divide by ~0.78 (rough adjustment for now-taxable income), and that's the civilian salary equivalent you need to maintain the same takehome.</p>
            <p>SkillBridge bridges this gap by letting you intern with a civilian employer for up to 180 days while still drawing active duty pay. If you can secure a SkillBridge slot that leads to a direct hire, the transition cliff disappears.</p>
            <p>Terminal leave can be sold back (up to 60 days in a career, one-time cash payment) OR burned (extends your retirement date, you stay on AD pay through the leave period). Burning gives you more total compensation; selling gives you immediate cash.</p>
          </LearnBlock>
        </section>

        {/* ===== VERIFY ===== */}
        <section id="verify" className="section">
          <div className="section-h">
            <h2 className="section-title">Verify</h2>
            <div className="section-meta">Auto-computed where data exists · all editable</div>
          </div>
          <p className="section-lede">
            Federal tax now derives from your actual income against 2026 brackets. Years in retirement derive from life expectancy on your age and gender. Every assumption is editable below.
          </p>

          <div className="surface" style={{marginBottom:18}}>
            <div style={{fontSize:11,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14,fontWeight:500}}>Auto-computed assumptions</div>
            <div className="grid-3">
              <Stat label="Federal effective tax rate" value={`${(calc.effectiveFedRate*100).toFixed(1)}%`}
                sub={fedTaxOverride!==null?"manual override":`on ${fmt(calc.totalTaxableIncome)} taxable income · ${filingStatus==="mfj"?"married filing jointly":"single"}`}
                accent/>
              <Stat label="Expected years in retirement" value={`${calc.yearsRetired}`}
                sub={`life expectancy ${calc.totalLifespan} · ${gender==="M"?"male":"female"} at retirement age ${retireAge}`}
                accent/>
              <Stat label="Federal tax this year" value={fmt(calc.autoFedTax)}
                sub={`after $${FED_STD_DEDUCTION_2026[filingStatus].toLocaleString()} standard deduction`}/>
            </div>
            <LearnBlock title="How the federal tax rate is computed">
              <p>Your taxable income = annual taxable pension (gross pension minus VA waiver minus SBP premium, times 12) + civilian salary. VA disability compensation is excluded because it is tax-free at the federal level.</p>
              <p>We apply the 2026 standard deduction (${FED_STD_DEDUCTION_2026[filingStatus].toLocaleString()} for {filingStatus==="mfj"?"married filing jointly":"single"}) then walk the 2026 progressive brackets (10% → 12% → 22% → 24% → 32% → 35% → 37%). The effective rate is total federal tax divided by total taxable income.</p>
              <p>This is more accurate than picking a single bracket rate. It does NOT include: itemized deductions, qualified business income deduction, retirement contributions, state tax deductions, capital gains, Social Security taxation, or Additional Medicare Tax. For complex situations, override below and use your tax professional's effective rate.</p>
            </LearnBlock>
          </div>

          <div className="grid-2">
            <div className="surface-inset">
              <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,color:"var(--ink-2)",fontWeight:500}}>Filing status</span>
              </div>
              <div className="seg" style={{marginTop:8}}>
                {[["single","Single"],["mfj","Married Filing Jointly"]].map(([k,l])=>(
                  <button key={k} className={filingStatus===k?"on":""} onClick={()=>setFilingStatus(k)}>{l}</button>
                ))}
              </div>
            </div>
            <div className="surface-inset">
              <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,color:"var(--ink-2)",fontWeight:500}}>Gender (for life expectancy)</span>
              </div>
              <div className="seg" style={{marginTop:8}}>
                {[["M","Male"],["F","Female"]].map(([k,l])=>(
                  <button key={k} className={gender===k?"on":""} onClick={()=>setGender(k)}>{l}</button>
                ))}
              </div>
            </div>
            <AssumpField label="Annual COLA" suffix="%" value={annualCOLA} setter={setAnnualCOLA} min={0} max={6} step={0.1} note="2026 actual: 2.8%. Long-run average ~2.5%."/>
            <AssumpField label="Annual military pay raise" suffix="%" value={jan1Raise} setter={setJan1Raise} min={1} max={6} step={0.1} note="2026 raise: 3.8%. Used for Jan 1 raise capture indicator."/>
            <AssumpField label="BRS personal discount rate" suffix="%" value={discountRate} setter={setDiscountRate} min={3} max={12} step={0.1} note="2026 DoD-set rate ~7%. Only relevant for BRS lump sum election."/>
            <AssumpField label="TSP annual growth" suffix="%" value={tspGrowth} setter={setTspGrowth} min={0} max={200} step={0.5} note="Cap raised to 200% for active-strategy modeling. Long-run S&P real return ~7%."/>
          </div>

          <details style={{marginTop:18}}>
            <summary>Override federal tax rate manually (advanced)</summary>
            <div className="details-body">
              <div className="field">
                <div className="field-label">
                  <span>Manual override</span>
                  <span className="field-value">{fedTaxOverride===null?"auto":fedTaxOverride+"%"}</span>
                </div>
                <input type="range" className="range-track" min={0} max={37} step={0.5} value={fedTaxOverride??Math.round(calc.autoEffectiveRate*100)} onChange={e=>setFedTaxOverride(Number(e.target.value))}/>
                <button className="btn" style={{fontSize:11.5,padding:"6px 10px",marginTop:6}} onClick={()=>setFedTaxOverride(null)}>Reset to auto-compute</button>
                <div className="field-help">Use this if you have unusual deductions, are not a US tax resident, or your tax pro gave you a different effective rate.</div>
              </div>
            </div>
          </details>

          <details style={{marginTop:12}}>
            <summary>Birth date + life expectancy detail</summary>
            <div className="details-body">
              <label className="field">
                <span className="field-label"><span>Birth date</span></span>
                <input type="date" className="ctrl" value={birthDate} aria-label="Birth date" onChange={e=>setBirthDate(e.target.value)}/>
              </label>
              <div style={{fontSize:13,color:"var(--ink-2)",marginTop:8}}>
                Current age: <b>{currentAge}</b>. You retire at age {retireAge} (set in inputs drawer). Life expectancy at age {retireAge} for {gender==="M"?"males":"females"}: ~{calc.totalLifespan} years. Years in retirement: <b className="num">{calc.yearsRetired}</b>.
              </div>
              <LearnBlock title="About the life expectancy model">
                <p>Estimates use simplified period life tables from the US Social Security Administration (2024 data). Average life expectancy at age 45 is approximately 80 years for males and 84 for females. These are population averages; military retirees tend to live slightly longer due to selection effects (you survived 20+ years of service).</p>
                <p>For planning, consider modeling to your 90th percentile lifespan, not your average. The risk in retirement planning is outliving your money, not dying with extra. A 45-year-old male's 90th percentile lifespan is closer to 92 than 80.</p>
              </LearnBlock>
            </div>
          </details>

          <details style={{marginTop:12}}>
            <summary>Full decomposition</summary>
            <div className="details-body">
              <FullDecomp calc={calc}/>
            </div>
          </details>

          <details style={{marginTop:12}}>
            <summary>System comparison · same career, different retirement system</summary>
            <div className="details-body">
              <div className="grid-4">
                {["high3","brs","finalpay","redux"].map(s=>{
                  const m=pensionMultiplier(s,years);
                  const monthly=highThree*m;
                  const labels={high3:"High-3",brs:"BRS",finalpay:"Final Pay",redux:"REDUX"};
                  return(
                    <div key={s} className="surface-inset" style={{borderColor:s===system?"var(--accent)":undefined}}>
                      <div style={{fontSize:11,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500}}>{labels[s]}</div>
                      <div className="num" style={{fontSize:22,marginTop:6}}>{fmt(monthly)}</div>
                      <div className="text-dim" style={{fontSize:12,marginTop:2}}>{(m*100).toFixed(1)}% mult</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </details>

          <details style={{marginTop:12}}>
            <summary>BAH gap + TRICARE</summary>
            <div className="details-body">
              <div className="grid-2">
                <div className="field">
                  <div className="field-label">
                    <span>BAH you'll lose at retirement</span>
                    <span className="field-value num">{fmt(lostBAH)}/mo</span>
                  </div>
                  <input type="range" className="range-track" min={0} max={6000} step={100} value={lostBAH} onChange={e=>setLostBAH(Number(e.target.value))}/>
                  <div className="field-help">National average for {rank}. Adjust to your duty station's BAH rate.</div>
                </div>
                <div className="field">
                  <div className="field-label"><span>TRICARE plan</span></div>
                  <select className="ctrl" value={tricarePlan} onChange={e=>setTricarePlan(e.target.value)}>
                    <option value="prime_indiv">Prime · Individual (~${TRICARE.prime_indiv}/mo)</option>
                    <option value="prime_family">Prime · Family (~${TRICARE.prime_family}/mo)</option>
                    <option value="select_indiv">Select · Individual (~${TRICARE.select_indiv}/mo)</option>
                    <option value="select_family">Select · Family (~${TRICARE.select_family}/mo)</option>
                    <option value="overseas_family">Overseas · Family (~${TRICARE.overseas_family}/mo)</option>
                  </select>
                </div>
              </div>
              <LearnBlock title="TRICARE for retirees: Prime, Select, and abroad">
                <p>As a retiree, you choose between TRICARE Prime (HMO-style: low out of pocket, network providers, requires primary care manager referrals) and TRICARE Select (PPO-style: more flexibility, higher copays, no referrals). Both have annual enrollment fees, deducted monthly from retired pay.</p>
                <p>At age 65, TRICARE for Life kicks in as a wraparound to Medicare. No TFL premium, but you must enroll in Medicare Part B (currently ~$185/month).</p>
                <p>Abroad: TRICARE Overseas Program covers most countries. You pay providers upfront and file for reimbursement. Network providers exist in major cities. Not covered: Cuba, Iran, North Korea, Sudan, Syria.</p>
                <p>For most healthy retirees in the US: TRICARE Select Family at ~$40/month plus copays is excellent insurance for a fraction of civilian premiums. Compare to a civilian family plan at $1,500-2,500/month.</p>
              </LearnBlock>
            </div>
          </details>
        </section>

        ssBenefitFRA={ssBenefitFRA}
        sbpOn={sbpOn}
        sbpBasePct={sbpBasePct}
        civilianSalary={civilianSalary}
        annualCOLA={annualCOLA}
        tspBalance={tspBalance}
        tspGrowth={tspGrowth}
        yearsToRetire={yearsToRetire}
        tspMonthlyDuringService={tspMonthlyDuringService}
        currentAge={currentAge}

      />
    </div>
  );
}

    <div id={id} className="shoot-detail-card" role="region" aria-label={`Detail for ${s.name}`}>
      <div className="ldc-grid">
        {/* Anchor + climate */}
        <div className="ldc-cell">
          <div className="ldc-label">Anchor reference</div>
          <div className="ldc-value">{loc.anchor||"—"}</div>
          <div className="ldc-sub">{loc.climate||""}</div>
        </div>

        {/* Healthcare */}
        <div className="ldc-cell">
          <div className="ldc-label">Healthcare quality <Conf level={isExpat?"medium":"low"}/></div>
          <div className="ldc-value">
            <span className="num">{loc.healthIdx?loc.healthIdx.toFixed(1):"—"}</span>
            <span className="ldc-bar"><span className="ldc-bar-fill" style={{width:`${Math.min(100,(loc.healthIdx||0))}%`,background:loc.healthIdx>=70?"var(--pos)":loc.healthIdx>=55?"var(--accent)":"var(--neg)"}}/></span>
          </div>
          <div className="ldc-sub">{healthVsUS?(healthVsUS>0?"+":"")+healthVsUS+"% vs US (67)":""} · {isExpat?"Numbeo 2026":"USNews 2024-25"}</div>
        </div>

        {/* Crime */}
        <div className="ldc-cell">
          <div className="ldc-label">Crime index <Conf level={isExpat?"medium":"low"}/></div>
          <div className="ldc-value">
            <span className="num">{loc.crimeIdx?loc.crimeIdx.toFixed(1):"—"}</span>
            <span className="ldc-bar"><span className="ldc-bar-fill" style={{width:`${Math.min(100,(loc.crimeIdx||0))}%`,background:loc.crimeIdx<=35?"var(--pos)":loc.crimeIdx<=50?"var(--accent)":"var(--neg)"}}/></span>
          </div>
          <div className="ldc-sub">lower is safer · {crimeVsUS?(crimeVsUS>0?"+":"")+crimeVsUS+"% vs US (49)":""} · {isExpat?"Numbeo 2026":"FBI UCR derived"}</div>
        </div>

        {/* Expat-specific cells */}
        {isExpat&&<>
          <div className="ldc-cell">
            <div className="ldc-label">Cost detail · rent</div>
            <div className="ldc-value"><span className="num">{loc.rentIdx}</span> <span style={{fontSize:11,color:"var(--ink-3)"}}>vs US 100</span></div>
            <div className="ldc-sub">groceries <b className="num">{loc.groceriesIdx}</b> · purchasing power varies by city</div>
          </div>
          <div className="ldc-cell">
            <div className="ldc-label">English proficiency</div>
            <div className="ldc-value">{loc.english||"—"}</div>
            <div className="ldc-sub">EF EPI 2024 derived · Native = English official language</div>
          </div>
          <div className="ldc-cell">
            <div className="ldc-label">Residency path</div>
            <div className="ldc-value">{loc.residencyPath||"—"}</div>
            <div className="ldc-sub">{loc.visa}</div>
          </div>
          <div className="ldc-cell">
            <div className="ldc-label">US tax treaty status</div>
            <div className="ldc-value">{loc.tax==="treaty"?"Protected":loc.tax==="limited"?"Limited":loc.tax==="territory"?"US territory":loc.tax==="none"?"No treaty":"—"}</div>

function Decomposition({calc}){
  // Note: netPension already excludes VA. We show "Pension takehome" as the pension net component,
  // then VA + CRSC as separate tax-free additions. Together they sum to netTotal. Deductions show
  // what was subtracted from the gross to get there.
  const items=[
    {label:"Pension takehome",value:calc.homeCalc.netPension,color:"#5a7a8a"},
    {label:"VA disability (tax-free)",value:calc.va,color:"#5fb27a"},
    ...(calc.crscRestore>0?[{label:"CRSC (tax-free)",value:calc.crscRestore,color:"#7a9b88"}]:[]),
    {label:"Federal tax",value:calc.homeCalc.monthlyFedTaxPension,color:"#3a3a36"},
    {label:"State tax",value:calc.homeCalc.monthlyStateTaxPension,color:"#4a4a44"},
    {label:"SBP premium",value:calc.sbpPremium,color:"#2a2a26"},
    {label:"TRICARE premium",value:calc.tricareMonthly,color:"#36363a"},
    {label:"VA waiver",value:calc.waiverAmount,color:"#1f1f1f"},
  ].filter(i=>i.value>0);
  const total=items.reduce((s,i)=>s+i.value,0);
  return(
    <div>
      <div className="stack">
        {items.map((i,idx)=>(
          <div key={idx} className="stack-seg" style={{flex:i.value/total,background:i.color}} title={`${i.label}: ${fmt(i.value)}`}/>
        ))}
      </div>
      <div className="stack-key">
        {items.map((i,idx)=>(
          <div key={idx} className="stack-key-item">
            <span className="stack-key-swatch" style={{background:i.color}}/>
            <span>{i.label}</span>
            <span className="stack-key-val num">{fmt(i.value)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function LocationSelect({value,onChange,exclude=[]}){
  return(
    <select className="ctrl" value={value} onChange={e=>onChange(e.target.value)} style={{maxWidth:340}}>
      <optgroup label="US States">
        {Object.entries(STATES).sort((a,b)=>a[1].n.localeCompare(b[1].n)).map(([k,v])=>(
          <option key={k} value={k} disabled={exclude.includes(k)}>{v.n}{exclude.includes(k)?" (in compare)":""}</option>
        ))}
      </optgroup>
      <optgroup label="Expat destinations">
        {Object.entries(EXPATS).sort((a,b)=>a[1].n.localeCompare(b[1].n)).map(([k,v])=>(
          <option key={k} value={k} disabled={exclude.includes(k)}>{v.n}{exclude.includes(k)?" (in compare)":""}</option>
        ))}
      </optgroup>
    </select>
  );
}

function MultiLocationPicker({values,onChange,exclude=[]}){
  const toggle=k=>{
    if(values.includes(k))onChange(values.filter(v=>v!==k));
    else if(values.length<7)onChange([...values,k]);
  };
  const POPULAR_STATES=["TX","FL","TN","NV","SD","WA","NC","SC","AZ","CO","NH","WY"];
  const POPULAR_EXPATS=["PRT","MEX","PAN","PHL","THA","CRI","ESP","COL","ECU","PRI","AUS","GBR","FRA","ITA"];
  return(
    <div>
      <div style={{fontSize:11,color:"var(--ink-3)",marginBottom:6}}>Popular US states</div>
      <div className="pill-group">
        {POPULAR_STATES.filter(p=>!exclude.includes(p)).map(k=>(
          <button key={k} className={`pill ${values.includes(k)?"active":""}`} onClick={()=>toggle(k)}>
            {STATES[k].n}
          </button>
        ))}
      </div>
      <div style={{fontSize:11,color:"var(--ink-3)",marginTop:12,marginBottom:6}}>Popular expat destinations</div>
      <div className="pill-group">
        {POPULAR_EXPATS.filter(p=>!exclude.includes(p)).map(k=>(
          <button key={k} className={`pill expat ${values.includes(k)?"active":""}`} onClick={()=>toggle(k)}>
            {EXPATS[k].n}
          </button>
        ))}
      </div>
      <div style={{marginTop:12,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"var(--ink-3)"}}>Other:</span>
        <select className="ctrl" style={{maxWidth:220}} value="" onChange={e=>{if(e.target.value)toggle(e.target.value)}}>
          <option value="">Pick any location...</option>
          <optgroup label="US States">
            {Object.entries(STATES).sort((a,b)=>a[1].n.localeCompare(b[1].n)).filter(([k])=>!exclude.includes(k)&&!values.includes(k)).map(([k,v])=>(
              <option key={k} value={k}>{v.n}</option>
            ))}
          </optgroup>
          <optgroup label="Expat destinations">
            {Object.entries(EXPATS).sort((a,b)=>a[1].n.localeCompare(b[1].n)).filter(([k])=>!exclude.includes(k)&&!values.includes(k)).map(([k,v])=>(
              <option key={k} value={k}>{v.n}</option>
            ))}
          </optgroup>
        </select>
        <span style={{fontSize:11.5,color:"var(--ink-3)"}}>{values.length}/7</span>
      </div>
    </div>
  );
}

// Accessibility note: each control gets an aria-label so screen readers announce
// what the input represents and its current value, even when visual context
// (the field-label span) is not associated via htmlFor.

function RangeField({label,value,setter,min,max,step=1}){
  return(
    <label className="field">
      <span className="field-label">
        <span>{label}</span>
        <span className="field-value num" aria-hidden="true">{value}</span>
      </span>
      <input type="range" className="range-track" min={min} max={max} step={step} value={value}
        aria-label={label} aria-valuenow={value} aria-valuemin={min} aria-valuemax={max}
        onChange={e=>setter(Number(e.target.value))}/>
    </label>
  );
}

function NumField({label,value,setter,prefix,min,max,step=1,range}){
  return(
    <label className="field">
      <span className="field-label"><span>{label}</span></span>
      {prefix
        ?<span className="ctrl-prefix-wrap"><span aria-hidden="true">{prefix}</span>
          <input type="number" value={value} min={min} max={max} step={step}
            aria-label={`${label}${prefix?" in "+prefix:""}`}
            onChange={e=>setter(Number(e.target.value))}/></span>
        :<input type="number" className="ctrl" value={value} min={min} max={max} step={step}
          aria-label={label}
          onChange={e=>setter(Number(e.target.value))}/>}
      {range&&<input type="range" className="range-track" min={min} max={max} step={step} value={value}
        aria-label={`${label} slider`} aria-valuenow={value} aria-valuemin={min} aria-valuemax={max}
        onChange={e=>setter(Number(e.target.value))}/>}
    </label>
  );
}

function SelectField({label,value,setter,options}){
  return(
    <label className="field">
      <span className="field-label"><span>{label}</span></span>
      <select className="ctrl" value={value} aria-label={label} onChange={e=>setter(e.target.value)}>
        {options.map(o=><option key={o.v} value={o.v} disabled={o.disabled}>{o.l}</option>)}
      </select>
    </label>
  );
}

function SegField({label,value,setter,options}){
  return(
    <div className="field" role="group" aria-label={label}>
      <div className="field-label"><span>{label}</span></div>
      <div className="seg" role="radiogroup" aria-label={label}>
        {options.map(([k,l])=>(
          <button key={k} type="button" role="radio"
            aria-checked={String(value)===String(k)}
            className={String(value)===String(k)?"on":""}
            onClick={()=>setter(k)}>{l}</button>
        ))}
      </div>
    </div>
  );
}

function ToggleField({label,value,setter}){
  return(
    <div className="toggle-row">
      <span id={`tog-${label.replace(/\s+/g,"-")}`}>{label}</span>
      <button type="button" role="switch"
        aria-checked={value}
        aria-labelledby={`tog-${label.replace(/\s+/g,"-")}`}
        className={`toggle ${value?"on":""}`}
        onClick={()=>setter(!value)}/>
    </div>
  );
}

function AssumpField({label,value,setter,suffix,min,max,step,note}){
  return(
    <label className="surface-inset" style={{display:"block"}}>
      <span style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:6}}>
        <span style={{fontSize:12,color:"var(--ink-2)",fontWeight:500}}>{label}</span>
        <span className="num text-accent" style={{fontSize:18,fontWeight:500}} aria-hidden="true">{value.toFixed(suffix==="%"?1:0)}{suffix}</span>
      </span>
      <input type="range" className="range-track" min={min} max={max} step={step} value={value}
        aria-label={`${label}${suffix||""}`}
        aria-valuenow={value} aria-valuemin={min} aria-valuemax={max}
        onChange={e=>setter(Number(e.target.value))}/>
      <span style={{fontSize:11.5,color:"var(--ink-3)",marginTop:8,lineHeight:1.4,display:"block"}}>{note}</span>
    </label>
  );
}

function FullDecomp({calc}){
  const rows=[
    ["Gross pension",calc.grossPension,`${(calc.mult*100).toFixed(1)}% multiplier × ${fmt(calc.grossPension/calc.mult)} High-3`],
    ...(calc.lumpSumPayout>0?[["BRS lump sum (one-time)",calc.lumpSumPayout,"paid at retirement"]]:[]),
    ["VA waiver",-calc.waiverAmount,calc.eligibleCRDP?"CRDP restored":"no concurrent receipt"],
    ["SBP premium",-calc.sbpPremium,"6.5% of base elected"],
    ["TRICARE premium",-calc.tricareMonthly,"deducted from retired pay"],
    [`Federal tax`,-calc.homeCalc.monthlyFedTaxPension,`auto · ${(calc.effectiveFedRate*100).toFixed(1)}% effective rate`],
    [`State tax (${calc.homeCalc.name})`,-calc.homeCalc.monthlyStateTaxPension,calc.homeCalc.stateTaxNote],
    ["VA disability (tax-free)",calc.va,"added back"],
    ...(calc.crscRestore>0?[["CRSC restoration (tax-free)",calc.crscRestore,"combat-related"]]:[]),
  ];
  return(
    <div>
      {rows.map(([label,value,note],i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:i<rows.length-1?"1px solid var(--line)":""}}>
          <div>
            <div style={{fontSize:14}}>{label}</div>
            <div style={{fontSize:11.5,color:"var(--ink-3)"}}>{note}</div>
          </div>
          <div className="num" style={{fontSize:15,fontWeight:500,color:value<0?"var(--ink-2)":"var(--ink)"}}>
            {value<0?"−":""}{fmt(Math.abs(value))}
          </div>
        </div>
      ))}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0 0",marginTop:4,borderTop:"1px solid var(--line-2)"}}>
        <div style={{fontWeight:500}}>Net monthly total</div>
        <div className="num text-accent" style={{fontSize:22,fontWeight:500}}>{fmt(calc.homeCalc.netTotal)}</div>
      </div>
    </div>
  );
}

function RunwayChart({calc,terminalDays,skillBridgeMo,pensionLagDays,civilianSalary}){
  // Use NET values everywhere so the chart matches the rest of the app.
  // Civilian salary is taxed at the user's effective fed + state rate.
  // SkillBridge keeps you on active duty pay (base × (1-fed) + BAH + BAS, all of which
  // the calc already computed as adMonthlyTakehome).
  const civilianMonthlyNet=civilianSalary/12*(1-calc.effectiveFedRate-calc.homeCalc.stateTaxRate);
  const skillBridgePay=calc.adMonthlyTakehome; // proxy for AD takehome during SkillBridge
  const pensionStart=Math.ceil(pensionLagDays/30);
  const months=Array.from({length:12},(_,i)=>{
    const m=i+1;
    return{
      m,
      pension:m>=pensionStart?calc.homeCalc.netTotal:0,
      civilian:m>skillBridgeMo?civilianMonthlyNet:0,
      terminal:m===1?calc.terminalLeavePay:0,
      skillbridge:m<=skillBridgeMo?skillBridgePay:0,
    };
  });
  months.forEach(x=>x.total=x.pension+x.civilian+x.terminal+x.skillbridge);
  const max=Math.max(...months.map(m=>m.total),1);
  // Guard against 0/0 = NaN when a month has zero total (zero civilian, no SkillBridge,
  // no terminal leave, delayed first pension check).
  const pct=(v,t)=>t>0?(v/t)*100:0;
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:4,alignItems:"end",height:140}}>
        {months.map(m=>(
          <div key={m.m} style={{display:"flex",flexDirection:"column",justifyContent:"flex-end",height:"100%"}}>
            <div style={{display:"flex",flexDirection:"column-reverse",borderRadius:"4px 4px 0 0",overflow:"hidden",height:`${(m.total/max)*100}%`,minHeight:4}}>
              <div style={{height:`${pct(m.skillbridge,m.total)}%`,background:"var(--accent)"}}/>
              <div style={{height:`${pct(m.civilian,m.total)}%`,background:"var(--pos)"}}/>
              <div style={{height:`${pct(m.pension,m.total)}%`,background:"#5a7a8a"}}/>
              <div style={{height:`${pct(m.terminal,m.total)}%`,background:"#c0c0c0"}}/>
            </div>
            <div style={{fontSize:9.5,color:"var(--ink-3)",marginTop:4,textAlign:"center"}}>{m.m}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:12,marginTop:14,fontSize:11.5,color:"var(--ink-2)"}}>
        <Leg color="var(--accent)" l="SkillBridge (AD net)"/>
        <Leg color="#c0c0c0" l="Terminal leave"/>
        <Leg color="#5a7a8a" l="Pension net"/>
        <Leg color="var(--pos)" l="Civilian net"/>
      </div>
    </div>
  );
}
function Leg({color,l}){return<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,background:color,borderRadius:2}}/>{l}</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
